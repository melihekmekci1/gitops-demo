apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nginx-dev
namePrefix: dev-

commonLabels:
  env: dev

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml

configMapGenerator:
  - name: nginx-config
    files:
      - config/app.conf

secretGenerator:
  - name: nginx-secret
    literals:
      - DB_HOST=dev-db.internal
      - DB_PASSWORD=dev-secret-pass
      - API_KEY=dev-api-key-12345
